name: Deploy UI to GitHub Pages

on:
    workflow_dispatch:
    push:
        branches: ["master"]
        paths:
            - "ui/frontend/**"
            - ".github/workflows/ui-gh-pages.yml"

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: ui/frontend/package-lock.json

            - name: Install deps
              working-directory: ui/frontend
              run: npm ci

            - name: Build frontend for GitHub Pages
              working-directory: ui/frontend
              env:
                  VITE_BASE_PATH: /secure-atm/
                  VITE_LOCAL_API_BASE: http://127.0.0.1:4000
              run: npm run build

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ui/frontend/dist

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
